openapi: 3.1.0
info:
  title: Labby API Contract
  version: 0.1.0
  description: Contrato inicial da F1. Deve ser expandido antes de cada fase funcional.
servers:
  - url: https://api.labby.com.br
  - url: http://localhost:8000
paths:
  /health:
    get:
      tags: [health]
      summary: Root healthcheck
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /healthz:
    get:
      tags: [health]
      summary: Root readiness check touching DB and Redis
      responses:
        "200":
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /api/v2/labby/health:
    get:
      tags: [health]
      summary: Labby API healthcheck
      responses:
        "200":
          description: Service status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/v2/labby/healthz:
    get:
      tags: [health]
      summary: Labby API readiness check touching DB and Redis
      responses:
        "200":
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: One or more dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /api/v2/labby/jobs/metrics:
    get:
      tags: [jobs]
      summary: Tenant-scoped job queue metrics
      responses:
        "200":
          description: Queue metrics grouped by queue and status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobMetricsResponse"
        "403":
          description: Admin role required
  /api/v2/labby/auth/login:
    post:
      tags: [auth]
      summary: Login with default membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v2/labby/auth/register:
    post:
      tags: [auth]
      summary: Create user, tenant and owner membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v2/labby/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh token and issue a new access token
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v2/labby/auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current refresh session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "204":
          description: Logged out
  /api/v2/labby/auth/me:
    get:
      tags: [auth]
      summary: Current user, active tenant and available memberships
      responses:
        "200":
          description: Current identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
  /api/v2/labby/auth/switch-tenant:
    post:
      tags: [auth]
      summary: Switch active membership
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwitchTenantRequest"
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v2/labby/auth/forgot-password:
    post:
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "204":
          description: Reset requested
  /api/v2/labby/auth/reset-password:
    post:
      tags: [auth]
      summary: Complete password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "204":
          description: Password reset
  /api/v2/labby/modules/:
    get:
      tags: [modules]
      summary: Current membership modules
      responses:
        "200":
          description: Module list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentModulesResponse"
  /api/v2/labby/modules/users:
    get:
      tags: [modules]
      summary: List tenant users and module access
      responses:
        "200":
          description: User module list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserModulesResponse"
  /api/v2/labby/modules/users/{user_id}:
    patch:
      tags: [modules]
      summary: Update user modules in the active tenant
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserModulesRequest"
      responses:
        "200":
          description: Updated module access
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateUserModulesResponse"
  /api/v2/labby/team/invites:
    get:
      tags: [team]
      summary: List team invites
      responses:
        "200":
          description: Invite list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamInvitesResponse"
    post:
      tags: [team]
      summary: Create team invite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamInviteRequest"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteMutationResponse"
  /api/v2/labby/team/invites/{invite_id}/resend:
    post:
      tags: [team]
      summary: Resend invite
      parameters:
        - name: invite_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteMutationResponse"
  /api/v2/labby/team/invites/{invite_id}/revoke:
    post:
      tags: [team]
      summary: Revoke invite
      parameters:
        - name: invite_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invite revoked
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: "#/components/schemas/LabbyTeamInvite"
  /api/v2/labby/team/invites/accept/{token}:
    get:
      tags: [team]
      summary: Preview public invite
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public invite
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicTeamInvite"
    post:
      tags: [team]
      summary: Accept public invite
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptTeamInviteRequest"
      responses:
        "200":
          description: Auth response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /api/v2/labby/contacts/:
    get:
      tags: [sales]
      summary: Flat alias for sales contacts list
      responses:
        "200":
          description: Contacts list
    post:
      tags: [sales]
      summary: Flat alias for create contact
      responses:
        "201":
          description: Contact created
  /api/v2/labby/contacts/{contact_id}:
    get:
      tags: [sales]
      summary: Flat alias for contact detail
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact detail
    put:
      tags: [sales]
      summary: Flat alias for update contact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact updated
    delete:
      tags: [sales]
      summary: Flat alias for delete contact
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Contact deleted
components:
  schemas:
    HealthResponse:
      type: object
      required: [status, service, environment]
      properties:
        status:
          type: string
        service:
          type: string
        environment:
          type: string
    DependencyHealth:
      type: object
      required: [ok, error]
      properties:
        ok:
          type: boolean
        error:
          type:
            - string
            - "null"
    ReadinessResponse:
      allOf:
        - $ref: "#/components/schemas/HealthResponse"
        - type: object
          required: [dependencies]
          properties:
            dependencies:
              type: object
              additionalProperties:
                $ref: "#/components/schemas/DependencyHealth"
    JobQueueMetricResponse:
      type: object
      required: [queue_name, status, count]
      properties:
        queue_name:
          type: string
        status:
          type: string
          enum: [pending, retrying, running, succeeded, dead_letter, cancelled]
        count:
          type: integer
    JobMetricsResponse:
      type: object
      required: [metrics]
      properties:
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/JobQueueMetricResponse"
    LabbyModule:
      type: object
      required: [key, label, description, accent, accent_bright]
      properties:
        key:
          type: string
          enum: [sales, social_media]
        label:
          type: string
        description:
          type: string
        accent:
          type: string
        accent_bright:
          type: string
    LoginRequest:
      type: object
      required: [email, senha]
      properties:
        email:
          type: string
          format: email
        senha:
          type: string
    RegisterRequest:
      type: object
      required: [nome, email, senha, empresa]
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        senha:
          type: string
          minLength: 8
        empresa:
          type: string
        telefone:
          type: string
    AuthResponse:
      type: object
      required: [access_token, token_type, user, tenant]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [bearer]
        user:
          $ref: "#/components/schemas/UserResponse"
        tenant:
          $ref: "#/components/schemas/TenantResponse"
    UserResponse:
      type: object
      required: [id, tenant_id, nome, email, role]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        nome:
          type: string
        email:
          type: string
          format: email
        avatar_url:
          type:
            - string
            - "null"
        role:
          type: string
          enum: [owner, admin, agent, viewer]
    TenantResponse:
      type: object
      required: [id, nome, slug, plano, ativo, modules, default_module]
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        slug:
          type: string
        plano:
          type: string
        ativo:
          type: boolean
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
        default_module:
          type: string
          enum: [sales, social_media]
    MembershipResponse:
      type: object
      required: [id, tenant_id, tenant_nome, tenant_slug, role, modules, default_module]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        tenant_nome:
          type: string
        tenant_slug:
          type: string
        role:
          type: string
          enum: [owner, admin, agent, viewer]
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
        default_module:
          type: string
          enum: [sales, social_media]
    MeResponse:
      type: object
      required: [user, tenant, memberships]
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        tenant:
          $ref: "#/components/schemas/TenantResponse"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipResponse"
    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type:
            - string
            - "null"
    SwitchTenantRequest:
      type: object
      required: [membership_id]
      properties:
        membership_id:
          type: string
          format: uuid
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [token, senha]
      properties:
        token:
          type: string
        senha:
          type: string
          minLength: 8
    CurrentModulesResponse:
      type: object
      required: [modules, default_module]
      properties:
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
        default_module:
          type: string
          enum: [sales, social_media]
    LabbyUserModule:
      type: object
      required: [id, nome, email, role, ativo, default_module, updated_at, modules]
      properties:
        id:
          type: string
          format: uuid
        nome:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, agent, viewer]
        ativo:
          type: boolean
        default_module:
          type: string
          enum: [sales, social_media]
        updated_at:
          type:
            - string
            - "null"
          format: date-time
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
    UserModulesStats:
      type: object
      required: [total, sales, social_media]
      properties:
        total:
          type: integer
        sales:
          type: integer
        social_media:
          type: integer
    UserModulesResponse:
      type: object
      required: [users, total, limit, offset, stats]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/LabbyUserModule"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
        stats:
          $ref: "#/components/schemas/UserModulesStats"
    UpdateUserModulesRequest:
      type: object
      required: [module_keys]
      properties:
        module_keys:
          type: array
          items:
            type: string
            enum: [sales, social_media]
        default_module:
          type: string
          enum: [sales, social_media]
        expected_updated_at:
          type:
            - string
            - "null"
          format: date-time
    UpdateUserModulesResponse:
      type: object
      required: [user_id, modules, default_module, updated_at]
      properties:
        user_id:
          type: string
          format: uuid
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
        default_module:
          type: string
          enum: [sales, social_media]
        updated_at:
          type:
            - string
            - "null"
          format: date-time
    CreateTeamInviteRequest:
      type: object
      required: [nome, email, role, module_keys]
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, agent, viewer]
        module_keys:
          type: array
          items:
            type: string
            enum: [sales, social_media]
        default_module:
          type: string
          enum: [sales, social_media]
    LabbyTeamInvite:
      type: object
      required:
        - id
        - tenant_id
        - email
        - nome
        - role
        - default_module
        - status
        - expires_at
        - last_sent_at
        - resend_count
        - invited_by_id
        - accepted_at
        - revoked_at
        - created_at
        - updated_at
        - modules
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        nome:
          type: string
        role:
          type: string
          enum: [admin, agent, viewer]
        default_module:
          type: string
          enum: [sales, social_media]
        status:
          type: string
          enum: [pending, accepted, revoked, expired]
        expires_at:
          type:
            - string
            - "null"
          format: date-time
        last_sent_at:
          type:
            - string
            - "null"
          format: date-time
        resend_count:
          type: integer
        invited_by_id:
          type:
            - string
            - "null"
          format: uuid
        invited_by_nome:
          type:
            - string
            - "null"
        accepted_at:
          type:
            - string
            - "null"
          format: date-time
        revoked_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type:
            - string
            - "null"
          format: date-time
        updated_at:
          type:
            - string
            - "null"
          format: date-time
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
    TeamInvitesResponse:
      type: object
      required: [invites, total, limit, offset]
      properties:
        invites:
          type: array
          items:
            $ref: "#/components/schemas/LabbyTeamInvite"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    InviteMutationResponse:
      type: object
      required: [invite, email_sent]
      properties:
        invite:
          $ref: "#/components/schemas/LabbyTeamInvite"
        email_sent:
          type: boolean
        email_error:
          type:
            - string
            - "null"
    PublicTeamInvite:
      type: object
      required: [id, tenant, email, nome, role, default_module, expires_at, modules]
      properties:
        id:
          type: string
          format: uuid
        tenant:
          type: object
          required: [id, nome]
          properties:
            id:
              type: string
              format: uuid
            nome:
              type: string
        email:
          type: string
          format: email
        nome:
          type: string
        role:
          type: string
          enum: [admin, agent, viewer]
        default_module:
          type: string
          enum: [sales, social_media]
        expires_at:
          type:
            - string
            - "null"
          format: date-time
        modules:
          type: array
          items:
            $ref: "#/components/schemas/LabbyModule"
    AcceptTeamInviteRequest:
      type: object
      required: [senha]
      properties:
        senha:
          type: string
          minLength: 8
        nome:
          type: string
