name: CI

on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: labby_test
          POSTGRES_USER: labby
          POSTGRES_PASSWORD: labby
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U labby -d labby_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        env:
          LABBY_TEST_DATABASE_URL: postgresql+psycopg://labby:labby@localhost:5432/labby_test
        run: pytest -q
